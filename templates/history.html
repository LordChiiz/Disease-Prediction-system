<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Patient History</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <div class="ecg-bg-container">
    <svg viewBox="0 0 1200 400" preserveAspectRatio="none" class="ecg-svg">
      <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="6" result="blur" />
          <feMerge>
            <feMergeNode in="blur" />
            <feMergeNode in="SourceGraphic" />
          </feMerge>
        </filter>
      </defs>
      <path class="ecg-line base-line" d="M 0,200 L 350,200 Q 370,185 385,200 L 415,200 L 430,225 L 455,40 L 480,340 L 500,200 L 530,200 Q 550,170 575,200 L 1200,200" />
      <path class="ecg-line pulse-line" d="M 0,200 L 350,200 Q 370,185 385,200 L 415,200 L 430,225 L 455,40 L 480,340 L 500,200 L 530,200 Q 550,170 575,200 L 1200,200" filter="url(#glow)" />
    </svg>
  </div>

  <div class="container">
    <div class="container">
      <header>
        <h1>📂 Patient History</h1>
        <a href="/" style="color: #3498db; text-decoration: none"
          >← Back to Diagnosis</a
        >
      </header>

      <div class="form-section" style="width: 100%; border-radius: 12px">
      <table style="width: 100%; border-collapse: collapse;">
        <thead>
          <tr style="background-color: #f2f2f2; text-align: left">
            <th style="padding: 10px">Date</th>
            <th style="padding: 10px">Patient Name</th>
            <th style="padding: 10px">Disease</th>
            <th style="padding: 10px">Confidence</th>
            <th style="padding: 10px">Symptoms</th>
            <th style="padding: 10px">Actions</th> <!-- Placed neatly in the header -->
          </tr>
        </thead>
        <tbody style="background-color: #ddd">
          {% for report in reports %}
          <tr style="border-bottom: 1px solid #ddd">
            <td style="padding: 10px">{{ report.date }}</td>
            <td style="padding: 10px"><strong>{{ report.patient_name }}</strong></td>
            <td style="padding: 10px; color: #e74c3c">{{ report.disease }}</td>
            <td style="padding: 10px">{{ report.confidence }}</td>
            <td style="padding: 10px">{{ report.symptoms }}</td>
            <!-- DELETE BUTTON COLUMN -->
            <td style="padding: 10px">
              <form action="{{ url_for('delete_patient', id=report.id) }}" method="POST" style="display:inline;">
                <button type="submit" 
                        class="btn btn-sm btn-outline-danger" 
                        onclick="return confirm('Are you sure you want to delete patient {{ report.patient_name }}?');">
                  🗑️ Delete
                </button>
              </form>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>      </div>
    </div>
  </body>
</html>
