<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Patient History</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>📂 Patient History</h1>
        <a href="/" style="color: #3498db; text-decoration: none"
          >← Back to Diagnosis</a
        >
      </header>

      <div class="form-section" style="width: 100%">
        <table style="width: 100%; border-collapse: collapse">
          <thead>
            <tr style="background-color: #f2f2f2; text-align: left">
              <th style="padding: 10px">Date</th>
              <th style="padding: 10px">Patient Name</th>
              <th style="padding: 10px">Disease</th>
              <th style="padding: 10px">Confidence</th>
              <th style="padding: 10px">Symptoms</th>
            </tr>
          </thead>
          <tbody>
            {% for report in reports %}
            <tr style="border-bottom: 1px solid #ddd">
              <td style="padding: 10px">{{ report.date }}</td>
              <td style="padding: 10px">
                <strong>{{ report.patient_name }}</strong>
              </td>
              <td style="padding: 10px; color: #e74c3c">
                {{ report.disease }}
              </td>
              <td style="padding: 10px">{{ report.confidence }}%</td>
              <td style="padding: 10px; font-size: 0.9em; color: #666">
                {{ report.symptoms }}
              </td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </body>
</html>
